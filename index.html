<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1" />
    <title>test</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: "PingFang SC", Helvetica, Tahoma, Arial, "Hiragino Sans GB", "Heiti SC", STXihei, "Microsoft YaHei", SimHei, "WenQuanYi Micro Hei";
        }
        html,body{
            background-color: #f4f4f6;
        }
        img{
            display: block;
            width: 100%;
            height: auto;
        }
        .header{
            position: fixed;
            display: flex;
            width: 100%;
            z-index: 999;
        }
        .content{
            position: relative;
            width: 100%;
            z-index: 1;
        }
        .cover-a {
            position: absolute;
            top: 15%;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85%;
            width: 100%;
            z-index: 2;
        }
        .cover-b {
            position: absolute;
            top: 47%;
            bottom: 0;
            left: 6%;
            right: 0;
            height: 6%;
            width: 88%;
            z-index: 3;
        }
        .name{
            position: absolute;
            top: 10.2%;
            left: 9.3%;
            font-size: 5.3vw;
            color: #fff;
        }
        .idnum{
            position: absolute;
            top: 10.2%;
            left: 59.1%;
            font-size: 5vw;
            color: #fff;
        }
        .date{
            position: absolute;
            top: 16.5%;
            left: 0%;
            width: 100%;
            font-size: 0vw;
            text-align: center;
        }
        #before-sec{
            font-size: 6vw;
            color: #000;
            font-family: Arial;
            user-select: none;
        }
        #sec{
            font-size: 6.6vw;
            color: #0098ff;
            font-family: Arial;
            font-weight: 700;
            user-select: none;
        }
        #test{
            position: absolute;
            top: 61.1%;
            left: 6%;
            width: 42.2%;
            color: #fff;
            font-family: Arial;
            font-weight: 300;
            font-size: 3.2vw;
            text-align: center;
            user-select: none;
        }
    </style>
</head>

<body>
    <header class="header">
        <img src="./empty/head.png" />
    </header>
    <div class="content">
        <img src="./empty/content.png" />
        <div class="cover-a"></div>
        <div
        class="cover-b"
        ></div>
        <div class="text">
            <span contenteditable="true" class="name">瑞</span>
            <span contenteditable="true" class="idnum">2371</span>
            <div class="date">
                <span id="before-sec"></span>
                <span id="sec"></span>
            </div>
            <span id="test"></span>
        </div>
    </div>
</body>

<script type="text/javascript">
    function showDate(){
        var d = new Date();
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = (d.getDate() < 10) ? ("0" + d.getDate()) : d.getDate();
        var hour = (d.getHours() < 10) ? ("0" + d.getHours()) : d.getHours();
        var min = (d.getMinutes() < 10) ? ("0" + d.getMinutes()) : d.getMinutes();
        var sec = (d.getSeconds() < 10) ? ("0" + d.getSeconds()) : d.getSeconds();
        document.getElementById("before-sec").innerHTML = (d.getFullYear() + "-" + month + "-" + date + " " + hour + ":" + min + ":");
    }
    function showSec(){
        var d = new Date();
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = (d.getDate() < 10) ? ("0" + d.getDate()) : d.getDate();
        var hour = (d.getHours() < 10) ? ("0" + d.getHours()) : d.getHours();
        var min = (d.getMinutes() < 10) ? ("0" + d.getMinutes()) : d.getMinutes();
        var sec = (d.getSeconds() < 10) ? ("0" + d.getSeconds()) : d.getSeconds();
        document.getElementById("sec").innerHTML = (sec);
    }
    function showTest(){
        var d = new Date();
        d.setTime(d.getTime()-24*60*60*1000-17*60*1000);
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = d.getDate();
        var hour = (d.getHours() < 10) ? ("0" + d.getHours()) : d.getHours();
        var min = (date < 7) ? (date + 53) : (date * 2 - 13);
        min = (min < 10) ? ("0" + min) : min;
        document.getElementById("test").innerHTML = (d.getFullYear() + "-" + month + "-" + date + " " + 12 + ":" + min);
    }
    showTest()
    setInterval(showDate, 1000)
    setInterval(showSec, 1000)
</script>
</html>
